<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Comparador de BD{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <style>
        :root {
            --bg:#0b1120; --card:#151f31; --card2:#0e1626; --border:#2a3a52;
            --text:#e2e8f0; --dim:#8fa3bd;
            --accent:#38bdf8; --accent-soft:rgba(56,189,248,.12);
            --green:#34d399; --red:#f87171; --amber:#fbbf24;
            --radius:12px; --radius-sm:8px;
            --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.5);
        }
        * { box-sizing: border-box; }
        html { scrollbar-color: var(--border) transparent; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            margin:0; color:var(--text); min-height:100vh;
            background:
                radial-gradient(900px 420px at 85% -10%, rgba(56,189,248,.09), transparent 60%),
                radial-gradient(700px 380px at -10% 0%, rgba(52,211,153,.05), transparent 60%),
                var(--bg);
        }
        ::selection { background:rgba(56,189,248,.35); }
        *::-webkit-scrollbar { width:10px; height:10px; }
        *::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px;
                                     border:2px solid transparent; background-clip:content-box; }
        *::-webkit-scrollbar-track { background:transparent; }

        /* ---- Header / navegación ---- */
        header {
            position:sticky; top:0; z-index:100;
            background:rgba(11,17,32,.85); backdrop-filter:blur(10px);
            padding:.65rem 1.5rem; border-bottom:1px solid var(--border);
            display:flex; gap:1rem; align-items:center; flex-wrap:wrap;
        }
        header .brand {
            font-size:1.05rem; font-weight:800; letter-spacing:.02em;
            color:var(--text); display:flex; align-items:center; gap:.5rem;
            margin-right:.75rem; text-decoration:none;
        }
        header .brand .logo {
            display:inline-flex; width:1.9rem; height:1.9rem; border-radius:8px;
            background:linear-gradient(135deg, var(--accent), #6366f1);
            align-items:center; justify-content:center; font-size:1rem;
        }
        header nav { display:flex; gap:.25rem; flex-wrap:wrap; }
        header nav a {
            color:var(--dim); text-decoration:none; font-weight:600; font-size:.92rem;
            padding:.42rem .85rem; border-radius:999px; border:1px solid transparent;
            transition:color .15s, background .15s, border-color .15s;
        }
        header nav a:hover { color:var(--text); background:rgba(255,255,255,.05); }
        header nav a.active {
            color:var(--accent); background:var(--accent-soft);
            border-color:rgba(56,189,248,.3);
        }

        main { max-width:1100px; margin:2rem auto; padding:0 1.25rem; }

        /* ---- Tarjetas y tipografía ---- */
        .card {
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
            padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow);
        }
        h1,h2,h3 { margin-top:0; letter-spacing:-.01em; }
        h1 { font-size:1.45rem; }
        h2 { font-size:1.2rem; }
        a { color:var(--accent); }
        .muted { color:var(--dim); font-size:.9rem; }

        /* ---- Tablas ---- */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th,td { text-align:left; padding:.55rem .65rem; border-bottom:1px solid var(--border); }
        th { color:var(--dim); font-size:.78rem; text-transform:uppercase;
             letter-spacing:.06em; font-weight:700; }
        tbody tr { transition:background .12s; }
        tbody tr:hover { background:rgba(255,255,255,.03); }
        tbody tr:last-child td { border-bottom:none; }

        /* ---- Formularios ---- */
        input, select {
            width:100%; padding:.55rem .7rem; background:var(--card2); color:var(--text);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            font-size:.95rem; transition:border-color .15s, box-shadow .15s;
        }
        input:focus, select:focus {
            outline:none; border-color:var(--accent);
            box-shadow:0 0 0 3px var(--accent-soft);
        }
        input::placeholder { color:#5c7290; }
        label { display:block; margin:.85rem 0 .3rem; font-weight:600; font-size:.9rem; }

        /* ---- Botones ---- */
        .btn {
            display:inline-flex; align-items:center; gap:.35rem;
            padding:.5rem 1rem; border-radius:var(--radius-sm); border:1px solid transparent;
            background:var(--accent); color:#081321; font-weight:700; font-size:.92rem;
            cursor:pointer; text-decoration:none; line-height:1.3;
            transition:filter .15s, transform .1s, background .15s, border-color .15s;
        }
        .btn:hover { filter:brightness(1.12); }
        .btn:active { transform:translateY(1px); }
        .btn:focus-visible { outline:none; box-shadow:0 0 0 3px var(--accent-soft),
                             0 0 0 1px var(--accent); }
        .btn.secondary {
            background:transparent; color:var(--text); border-color:var(--border);
        }
        .btn.secondary:hover { background:rgba(255,255,255,.06); border-color:#42587a; filter:none; }
        .btn.danger { background:transparent; color:var(--red); border-color:rgba(248,113,113,.4); }
        .btn.danger:hover { background:rgba(248,113,113,.12); border-color:var(--red); filter:none; }
        .btn.danger.solid { background:var(--red); color:#fff; border-color:transparent; }
        .btn.danger.solid:hover { filter:brightness(1.1); }
        .btn.sm { padding:.35rem .7rem; font-size:.85rem; }

        /* ---- Mensajes flash ---- */
        .msg {
            padding:.7rem 1rem; border-radius:var(--radius-sm); margin-bottom:.6rem;
            display:flex; gap:.55rem; align-items:baseline; font-size:.93rem;
            border:1px solid var(--border); border-left-width:4px; background:var(--card);
        }
        .msg.success { border-left-color:var(--green); }
        .msg.success::before { content:"✔"; color:var(--green); font-weight:800; }
        .msg.error { border-left-color:var(--red); }
        .msg.error::before { content:"✖"; color:var(--red); font-weight:800; }

        /* ---- Código / SQL ---- */
        pre { background:#060b16; color:var(--text); padding:1rem; border-radius:var(--radius-sm);
              overflow:auto; border:1px solid var(--border); max-height:500px; margin:0; }
        pre code.hljs { padding:0; background:transparent; font-family:
              ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:.85rem; }

        /* ---- Badges de estado ---- */
        .badge { padding:.14rem .55rem; border-radius:999px; font-size:.74rem; font-weight:700;
                 white-space:nowrap; border:1px solid transparent; }
        .b-add { background:rgba(52,211,153,.15); color:var(--green); border-color:rgba(52,211,153,.3); }
        .b-del { background:rgba(248,113,113,.15); color:var(--red); border-color:rgba(248,113,113,.3); }
        .b-chg { background:rgba(251,191,36,.15); color:var(--amber); border-color:rgba(251,191,36,.3); }

        /* ---- Paneles horizontales (grupos de diferencias) ---- */
        .panels { display:flex; gap:1rem; overflow-x:auto; padding-bottom:.75rem; align-items:flex-start; }
        .panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
                 min-width:320px; max-width:380px; flex:0 0 auto; display:flex; flex-direction:column;
                 max-height:520px; }
        .panel > h3 { margin:0; padding:.75rem 1rem; border-bottom:1px solid var(--border);
                      position:sticky; top:0; background:var(--card);
                      border-radius:var(--radius) var(--radius) 0 0; font-size:.95rem; }
        .panel .panel-body { overflow-y:auto; padding:.5rem .75rem; }
        .panel .row { display:flex; gap:.5rem; align-items:flex-start; padding:.4rem .25rem;
                      border-bottom:1px solid var(--border); }
        .panel .row:last-child { border-bottom:none; }
        .panel .row input[type=checkbox] { width:auto; margin-top:.2rem; }
        .panel .row .meta { min-width:0; }
        .panel .row .obj { font-weight:600; word-break:break-word; }
        .panel .row .det { color:var(--dim); font-size:.8rem; word-break:break-word; }
        .panel .count { color:var(--dim); font-weight:400; }
        .panel.destructive { border-color:var(--red); }
        .panel.destructive > h3 { color:var(--red); }

        /* ---- Grilla de objetos ---- */
        .grid-wrap { max-height:420px; overflow:auto; border:1px solid var(--border);
                     border-radius:var(--radius-sm); }
        table.grid { width:100%; border-collapse:separate; border-spacing:0; font-size:.9rem; }
        table.grid thead th { position:sticky; top:0; background:var(--card2); z-index:2;
                              padding:.55rem .65rem; border-bottom:1px solid var(--border); text-align:left; }
        table.grid thead tr.filters th { top:2.25rem; padding:.3rem .4rem; }
        table.grid thead tr.filters input, table.grid thead tr.filters select {
            width:100%; padding:.32rem .5rem; font-size:.85rem; }
        table.grid tbody td { padding:.42rem .65rem; border-bottom:1px solid var(--border); }
        table.grid tbody tr { cursor:pointer; }
        table.grid tbody tr:hover { background:var(--accent-soft); }
        table.grid tbody tr.selected { background:rgba(56,189,248,.22); }
        table.grid tbody tr.selected td:first-child { box-shadow:inset 3px 0 0 var(--accent); }
        input[type=checkbox] { accent-color:var(--accent); }

        .toolbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-bottom:.6rem; }
        .toolbar .spacer { flex:1; }
        .st-count { display:inline-block; min-width:1.5rem; }

        /* ---- Modal ---- */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(2,6,16,.7);
                         backdrop-filter:blur(3px); z-index:1000;
                         align-items:center; justify-content:center; padding:1rem; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--card); border:1px solid var(--border); border-radius:14px;
                 width:min(900px, 96vw); max-height:90vh; display:flex; flex-direction:column;
                 box-shadow:0 20px 60px rgba(0,0,0,.6); }
        .modal-header, .modal-footer { padding:1rem 1.25rem; display:flex; align-items:center;
                                       gap:.5rem; flex-wrap:wrap; }
        .modal-header { border-bottom:1px solid var(--border); }
        .modal-footer { border-top:1px solid var(--border); justify-content:flex-end; }
        .modal-header h2 { margin:0; font-size:1.1rem; }
        .modal-body { padding:1rem 1.25rem; overflow:auto; }
        .modal-body pre { margin:0; max-height:none; }
        .modal-close { background:none; border:none; color:var(--dim); font-size:1.5rem;
                       cursor:pointer; line-height:1; border-radius:6px; padding:.1rem .4rem;
                       transition:color .15s, background .15s; }
        .modal-close:hover { color:var(--text); background:rgba(255,255,255,.07); }

        /* ---- Hero + tarjetas de proyecto ---- */
        .hero {
            position:relative; overflow:hidden;
            background:linear-gradient(135deg, #16233c, var(--card2));
            border:1px solid var(--border); border-radius:16px;
            padding:1.9rem 2.1rem; margin-bottom:1.5rem; box-shadow:var(--shadow);
        }
        .hero::after {
            content:""; position:absolute; inset:0; pointer-events:none;
            background:radial-gradient(480px 200px at 90% 0%, rgba(56,189,248,.15), transparent 70%);
        }
        .hero h1 { margin:0 0 .4rem; font-size:1.55rem; }
        .hero p { margin:0; color:var(--dim); max-width:60ch; }
        .stats { display:flex; gap:1rem; flex-wrap:wrap; margin-top:1.35rem; }
        .stat { background:rgba(255,255,255,.04); border:1px solid var(--border);
                border-radius:var(--radius-sm); padding:.7rem 1.15rem; min-width:118px; }
        .stat .n { font-size:1.65rem; font-weight:800; color:var(--accent); line-height:1.15; }
        .stat .l { font-size:.78rem; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:1rem; }
        .pcard { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
                 padding:1.25rem; display:flex; flex-direction:column; gap:.75rem;
                 box-shadow:var(--shadow);
                 transition:border-color .15s, transform .15s, box-shadow .15s; }
        .pcard:hover { border-color:rgba(56,189,248,.5); transform:translateY(-2px);
                       box-shadow:0 10px 30px -10px rgba(0,0,0,.6); }
        .pcard h3 { margin:0; font-size:1.12rem; }
        .flow { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
        .chip { background:var(--accent-soft); border:1px solid rgba(56,189,248,.3);
                border-radius:999px; padding:.2rem .7rem; font-size:.84rem; }
        .chip.dst { background:rgba(251,191,36,.1); border-color:rgba(251,191,36,.35); }
        .arrow { color:var(--accent); font-weight:700; }
        .pcard .meta { color:var(--dim); font-size:.85rem; }
        .pcard .actions { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:auto;
                          padding-top:.5rem; border-top:1px solid var(--border); }
        .steps { display:flex; gap:1rem; flex-wrap:wrap; margin-top:1rem; }
        .step { flex:1; min-width:220px; background:var(--card2); border:1px solid var(--border);
                border-radius:var(--radius-sm); padding:1rem; }
        .step .num { display:inline-flex; width:1.8rem; height:1.8rem; border-radius:50%;
                     background:var(--accent); color:#081321; font-weight:800;
                     align-items:center; justify-content:center; margin-bottom:.5rem; }

        /* ---- Responsive ---- */
        @media (max-width: 720px) {
            header { padding:.6rem 1rem; }
            main { margin:1.25rem auto; }
            .card { padding:1.1rem; }
            .hero { padding:1.4rem 1.25rem; }
            th,td { padding:.45rem .5rem; font-size:.88rem; }
        }
    </style>
</head>
<body>
<header>
    <a class="brand" href="{% url 'project_list' %}"><span class="logo">🗄️</span> Comparador de BD</a>
    <nav>
        <a href="{% url 'project_list' %}"
           class="{% if request.path == '/' or 'proyectos' in request.path %}active{% endif %}">Proyectos</a>
        <a href="{% url 'compare' %}"
           class="{% if 'comparar' in request.path %}active{% endif %}">Comparar (ad hoc)</a>
        <a href="{% url 'comparison_list' %}"
           class="{% if 'historial' in request.path %}active{% endif %}">Historial</a>
        <a href="{% url 'connection_list' %}"
           class="{% if 'conexiones' in request.path %}active{% endif %}">Conexiones</a>
    </nav>
</header>
<main>
    {% if messages %}
        {% for message in messages %}
            <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
