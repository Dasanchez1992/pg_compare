{% extends "comparator/base.html" %}
{% block title %}Eliminar conexión{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
    <h1>Eliminar conexión</h1>
    <p>¿Seguro que deseas eliminar <strong>{{ conn.name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn danger" type="submit">Sí, eliminar</button>
        <a class="btn secondary" href="{% url 'connection_list' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
