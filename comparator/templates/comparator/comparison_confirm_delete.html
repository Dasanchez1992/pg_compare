{% extends "comparator/base.html" %}
{% block title %}Eliminar comparación{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
    <h1>Eliminar comparación</h1>
    <p>¿Seguro que deseas eliminar del historial <strong>{{ run.db1_name }} v {{ run.db2_name }}</strong>
       ({{ run.created_at|date:"Y-m-d H:i" }})?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn danger solid" type="submit">Sí, eliminar</button>
        <a class="btn secondary" href="{% url 'comparison_list' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
